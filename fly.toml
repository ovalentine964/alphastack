app = "alphastack-api"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  AI_PROVIDER = "nvidia"
  AI_BASE_URL = "https://integrate.api.nvidia.com/v1"
  AI_MODEL = "deepseek-ai/deepseek-v4-flash"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
