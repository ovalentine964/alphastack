# AlphaStack Prometheus Alert Rules
# Covers: trading, risk, agents, infrastructure, MT5 bridge
groups:
  - name: alphastack_trading
    rules:
      # ─── Critical: Trading circuit breaker triggered ──────────
      - alert: TradingHalted
        expr: increase(alphastack_pipeline_halts_total{halt_reason=~".*circuit_breaker.*"}[5m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Trading circuit breaker triggered"
          description: "Pipeline halted due to {{ $labels.halt_reason }}"

      # ─── Warning: Daily loss approaching limit ────────────────
      - alert: DailyLossWarning
        expr: alphastack_pnl_daily < -30
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Daily P&L at {{ $value }} — approaching 4% circuit breaker"

      # ─── Critical: Daily loss circuit breaker ─────────────────
      - alert: DailyLossCritical
        expr: alphastack_pnl_daily < -40
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Daily loss circuit breaker triggered: {{ $value }}"

      # ─── Warning: Drawdown elevated ──────────────────────────
      - alert: DrawdownWarning
        expr: alphastack_drawdown_current > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Drawdown at {{ $value }}%"

      # ─── Critical: Drawdown limit ────────────────────────────
      - alert: DrawdownCritical
        expr: alphastack_drawdown_current > 15
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "CRITICAL: Drawdown at {{ $value }}% — consider manual intervention"

      # ─── High: Agent timeout rate ────────────────────────────
      - alert: AgentTimeoutHigh
        expr: rate(alphastack_agent_timeout_total[15m]) > 5
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "{{ $labels.agent_name }} experiencing high timeout rate"

      # ─── High: Agent error rate ──────────────────────────────
      - alert: AgentErrorRateHigh
        expr: rate(alphastack_agent_errors_total[15m]) > 10
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "{{ $labels.agent_name }} error rate elevated"

      # ─── Warning: Pipeline latency ───────────────────────────
      - alert: PipelineLatencyHigh
        expr: histogram_quantile(0.95, rate(alphastack_pipeline_processing_seconds_bucket[5m])) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Pipeline P95 latency at {{ $value }}s — exceeds 2s target"

      # ─── Warning: Event bus lag ──────────────────────────────
      - alert: EventBusLagHigh
        expr: alphastack_event_bus_consumer_lag > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Event bus lag at {{ $value }} messages for {{ $labels.consumer_group }}"

      # ─── Warning: LLM cost spike ────────────────────────────
      - alert: LLMCostSpike
        expr: rate(alphastack_llm_cost_usd[1h]) > 5
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "LLM cost rate at ${{ $value }}/hour — investigate"

      # ─── Warning: Agent eval regression ──────────────────────
      - alert: AgentEvalRegression
        expr: alphastack_agent_eval_pass_rate < 0.90
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.agent_name }} eval pass rate dropped to {{ $value }}"

      # ─── Warning: No signals generated ──────────────────────
      - alert: NoSignalsGenerated
        expr: increase(alphastack_signals_total[2h]) == 0
        for: 2h
        labels:
          severity: warning
        annotations:
          summary: "No trading signals generated in the last 2 hours"

  - name: alphastack_infrastructure
    rules:
      - alert: RedisDown
        expr: up{job="alphastack-redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"

      - alert: DatabaseDown
        expr: up{job="alphastack-timescaledb"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL/TimescaleDB is down"

      - alert: APIEndpointDown
        expr: up{job="alphastack-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "AlphaStack API is down"

      - alert: TradingEngineDown
        expr: up{job="alphastack-engine"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "AlphaStack trading engine is down"

      - alert: HighAPIErrorRate
        expr: |
          rate(alphastack_api_requests_total{status=~"5.."}[5m])
          / rate(alphastack_api_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API error rate (> 5%)"

      - alert: HighAPILatency
        expr: histogram_quantile(0.95, rate(alphastack_api_latency_seconds_bucket[5m])) > 2.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency > 2 seconds"

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / 1024 / 1024 > 512
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage at {{ $value }}MB — possible leak"

      - alert: StaleMarketData
        expr: alphastack_data_stale_seconds > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Market data stale for {{ $labels.symbol }}"

      - alert: DBConnectionPoolHigh
        expr: alphastack_db_pool_checked_out / alphastack_db_pool_size > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Database connection pool > 80% utilized"

  - name: alphastack_mt5_bridge
    rules:
      - alert: MT5BridgeDown
        expr: up{job="alphastack-mt5-bridge"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "MT5 Bridge is down — forex trading halted"

      - alert: MT5Disconnected
        expr: mt5_bridge_connected == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "MT5 terminal not connected — check bridge logs"

      - alert: MT5OrderRejectionHigh
        expr: rate(mt5_bridge_orders_rejected[10m]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MT5 order rejection rate elevated — {{ $value }}/min"

      - alert: MT5OrderLatencyHigh
        expr: histogram_quantile(0.95, rate(mt5_bridge_order_latency_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "MT5 order P95 latency at {{ $value }}s"
