# Prometheus configuration for AlphaStack
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  # ─── AlphaStack API ──────────────────────────────────────────
  - job_name: "alphastack-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "api"
          environment: "production"

  # ─── AlphaStack Trading Engine ───────────────────────────────
  - job_name: "alphastack-engine"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["trading-engine:8000"]
        labels:
          service: "engine"
          environment: "production"

  # ─── Prometheus self-monitoring ──────────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ─── Node Exporter (host metrics) ───────────────────────────
  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

  # ─── Redis Exporter ─────────────────────────────────────────
  - job_name: "alphastack-redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: "redis"

  # ─── PostgreSQL Exporter ────────────────────────────────────
  - job_name: "alphastack-timescaledb"
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: "postgres"
