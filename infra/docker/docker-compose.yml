# =============================================================================
# AlphaStack — Docker Compose (Production)
# =============================================================================
# Usage:
#   cp .env.example .env   # fill in secrets
#   docker compose up -d   # start all services (API + infra)
#   docker compose --profile engine up -d  # include trading engine worker
#
# Secrets are loaded from .env (never committed) or Docker secrets.
# =============================================================================

x-common-env: &common-env
  ALPHASTACK_ENV: ${ALPHASTACK_ENV:-dev}
  DB_HOST: timescaledb
  DB_PORT: "5432"
  DB_NAME: ${DB_NAME:-alphastack}
  DB_USER: ${DB_USER:-alphastack}
  DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_DEBUG: ${API_DEBUG:-false}
  MT5_BRIDGE_URL: "http://mt5-bridge:8080"

x-resource-limits: &resource-limits
  deploy:
    resources:
      limits:
        memory: 2G
        cpus: "2.0"
      reservations:
        memory: 512M
        cpus: "0.5"

x-logging: &default-logging
  logging:
    driver: loki
    options:
      loki-url: "http://loki:3100/loki/api/v1/push"
      loki-retries: "3"
      loki-batch-size: "400"
      max-size: "50m"
      max-file: "5"

networks:
  alphastack-net:
    driver: bridge
  monitoring-net:
    driver: bridge

services:
  # ==========================================================================
  # TIMESCALEDB (PostgreSQL + TimescaleDB extension)
  # ==========================================================================
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: alphastack-timescaledb
    restart: unless-stopped
    ports:
      - "${DB_PORT_EXTERNAL:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-alphastack}
      POSTGRES_USER: ${DB_USER:-alphastack}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-alphastack} -d ${DB_NAME:-alphastack}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - alphastack-net
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ==========================================================================
  # REDIS
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: alphastack-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    ports:
      - "${REDIS_PORT_EXTERNAL:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - alphastack-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 64M

  # ==========================================================================
  # API SERVER — start.py wires up all subsystems and runs uvicorn
  # ==========================================================================
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: alphastack-api
    restart: unless-stopped
    command: ["python", "start.py"]
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      <<: *common-env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - api_logs:/app/logs
    networks:
      - alphastack-net
    <<: *resource-limits

  # ==========================================================================
  # TRADING ENGINE — background orchestrator (LangGraph agent pipeline)
  # ==========================================================================
  trading-engine:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: alphastack-engine
    restart: unless-stopped
    command: ["python", "-m", "alphastack.agents.orchestrator.graph"]
    environment:
      <<: *common-env
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      mt5-bridge:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import alphastack; print('ok')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - engine_logs:/app/logs
    networks:
      - alphastack-net
    profiles:
      - engine
    <<: *resource-limits

  # ==========================================================================
  # MT5 BRIDGE — MetaTrader 5 running under Wine in Docker
  # ==========================================================================
  mt5-bridge:
    build:
      context: ../mt5-bridge
      dockerfile: Dockerfile
    container_name: alphastack-mt5-bridge
    restart: unless-stopped
    environment:
      MT5_LOGIN: ${MT5_LOGIN:-0}
      MT5_PASSWORD: ${MT5_PASSWORD:-}
      MT5_SERVER: ${MT5_SERVER:-}
      MT5_PATH: ${MT5_PATH:-}
      API_PORT: "8080"
      VNC_PORT: "3000"
      VNC_PASSWORD: ${MT5_VNC_PASSWORD:-alphastack}
      REDIS_URL: "redis://redis:6379"
      BRIDGE_MAGIC: "20260713"
    ports:
      - "${MT5_VNC_PORT:-3000}:3000"
      - "${MT5_API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - mt5_data:/config
      - mt5_bridge_logs:/var/log/supervisor
    networks:
      - alphastack-net
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"

  # ==========================================================================
  # PROMETHEUS
  # ==========================================================================
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: alphastack-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=5GB"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - alphastack-net
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ==========================================================================
  # LOKI (log aggregation)
  # ==========================================================================
  loki:
    image: grafana/loki:3.0.0
    container_name: alphastack-loki
    restart: unless-stopped
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ==========================================================================
  # GRAFANA (dashboards)
  # ==========================================================================
  grafana:
    image: grafana/grafana:11.1.0
    container_name: alphastack-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?Set GRAFANA_PASSWORD in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_URL:-http://localhost:3001}
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    networks:
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ==========================================================================
  # REDIS EXPORTER (Prometheus metrics for Redis)
  # ==========================================================================
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: alphastack-redis-exporter
    restart: unless-stopped
    ports:
      - "${REDIS_EXPORTER_PORT:-9121}:9121"
    environment:
      REDIS_ADDR: redis://redis:6379
      ${REDIS_PASSWORD:+REDIS_PASSWORD: ${REDIS_PASSWORD}}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - alphastack-net
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

  # ==========================================================================
  # POSTGRES EXPORTER (Prometheus metrics for TimescaleDB)
  # ==========================================================================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: alphastack-postgres-exporter
    restart: unless-stopped
    ports:
      - "${PG_EXPORTER_PORT:-9187}:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER:-alphastack}:${DB_PASSWORD}@timescaledb:5432/${DB_NAME:-alphastack}?sslmode=disable"
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - alphastack-net
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

  # ==========================================================================
  # NODE EXPORTER (host-level metrics: CPU, memory, disk, network)
  # ==========================================================================
  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: alphastack-node-exporter
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 32M

volumes:
  timescaledb_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  api_logs:
    driver: local
  engine_logs:
    driver: local
  loki_data:
    driver: local
  mt5_data:
    driver: local
  mt5_bridge_logs:
    driver: local
