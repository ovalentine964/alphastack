name: Auto-Build Mobile APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.0

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Analyze
        working-directory: apps/mobile
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Setup signing keystore
        working-directory: apps/mobile/android/app
        run: |
          echo "KEYSTORE_PATH=${{ github.workspace }}/apps/mobile/android/app/release.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=alphastack123" >> $GITHUB_ENV
          echo "KEY_ALIAS=alphastack" >> $GITHUB_ENV
          echo "KEY_PASSWORD=alphastack123" >> $GITHUB_ENV

      - name: Build Release APK
        working-directory: apps/mobile
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: alphastack-apk
          path: apps/mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
