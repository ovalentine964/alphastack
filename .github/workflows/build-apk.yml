name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/mobile/**'
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.24.5"
  JAVA_VERSION: "17"

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test --coverage || true

      - name: Decode keystore (release signing)
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && format('{0}/android/app/release.keystore', github.workspace) || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alphastack-apk-${{ github.sha }}
          path: |
            apps/mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            apps/mobile/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            apps/mobile/build/app/outputs/flutter-apk/app-x86_64-release.apk
            apps/mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90
          if-no-files-found: warn

  # ─── Create GitHub Release on tag ──────────────────────────────
  release:
    name: Publish Release
    needs: build-apk
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: alphastack-apk-${{ github.sha }}
          path: release-apks

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AlphaStack Mobile ${{ github.ref_name }}"
          body: |
            ## 📱 AlphaStack Mobile ${{ github.ref_name }}

            ### Downloads
            - **Universal APK** — works on all devices (larger size)
            - **arm64-v8a** — modern Android phones (recommended)
            - **armeabi-v7a** — older 32-bit devices
            - **x86_64** — emulators / Chromebooks

            ### Installation
            1. Download the APK for your device
            2. Enable "Install from unknown sources" if prompted
            3. Open the APK to install
          files: |
            release-apks/app-release.apk
            release-apks/app-arm64-v8a-release.apk
            release-apks/app-armeabi-v7a-release.apk
            release-apks/app-x86_64-release.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
