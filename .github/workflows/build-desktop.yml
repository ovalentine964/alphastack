###############################################################################
# AlphaStack — Desktop Build (CI)
# Trigger: push to main (apps/desktop changes) · manual dispatch
# Builds Tauri desktop for Windows, macOS, Linux and uploads installers.
###############################################################################
name: "🖥️ Build Desktop"

on:
  push:
    branches: [main]
    paths:
      - "apps/desktop/**"
      - ".github/workflows/build-desktop.yml"
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux
          - os: macos-latest
            label: macos
          - os: windows-latest
            label: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      # ── Linux system deps ──
      - name: Install Linux dependencies
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev \
            libappindicator3-dev librsvg2-dev patchelf

      # ── macOS deps ──
      - name: Install macOS dependencies
        if: matrix.label == 'macos'
        run: brew install openssl

      # ── Build ──
      - name: Install npm dependencies
        working-directory: apps/desktop
        run: npm install

      - name: Build Tauri app
        working-directory: apps/desktop
        run: npm run tauri build

      # ── Collect ──
      - name: Collect installers
        shell: bash
        run: |
          mkdir -p dist
          find apps/desktop/src-tauri/target/release/bundle \
            \( -name "*.exe" -o -name "*.msi" -o -name "*.dmg" \
               -o -name "*.AppImage" -o -name "*.deb" \) \
            -exec cp {} dist/ \;
          echo "### 📦 Desktop installers (${{ matrix.label }})" >> "$GITHUB_STEP_SUMMARY"
          for f in dist/*; do echo "- \`$(basename $f)\` — $(du -h "$f" | cut -f1)" >> "$GITHUB_STEP_SUMMARY"; done

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.label }}
          path: dist/*
          retention-days: 30
