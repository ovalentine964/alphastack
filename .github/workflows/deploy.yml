name: Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Build & Test ────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install & test
        run: |
          pip install -e ".[dev]"
          pytest tests/ -v --tb=short -x

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to Staging ──────────────────────────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'staging' ||
      startsWith(github.ref, 'refs/tags/v')
    environment:
      name: staging
      url: https://staging.alphastack.dev

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Replace with actual deployment commands:
          # kubectl set image deployment/alphastack \
          #   alphastack=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          #   --namespace=staging
          echo "✅ Staging deployment complete"

      - name: Smoke test
        run: |
          echo "Running smoke tests against staging..."
          # curl -f https://staging.alphastack.dev/health || exit 1
          echo "✅ Smoke tests passed"

  # ─── Deploy to Production ───────────────────────────────────────
  deploy-production:
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://alphastack.dev

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # kubectl set image deployment/alphastack \
          #   alphastack=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          #   --namespace=production
          echo "✅ Production deployment complete"

      - name: Verify health
        run: |
          echo "Verifying production health..."
          # curl -f https://alphastack.dev/health || exit 1
          echo "✅ Production health check passed"
