name: Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Lint + Type-check + Test ─────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check src/ tests/ --output-format=github
          ruff format --check src/ tests/

      - name: Type check with mypy
        run: |
          mypy src/alphastack/ --ignore-missing-imports

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short -x --cov=alphastack --cov-report=term-missing
        env:
          REDIS_URL: redis://localhost:6379/0

  # ─── Build & Push Docker Image ───────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy to Staging ──────────────────────────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'staging' ||
      startsWith(github.ref, 'refs/tags/v')
    environment:
      name: staging
      url: https://staging.alphastack.dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      - name: Deploy to staging
        run: |
          set -euo pipefail
          IMAGE_TAG="${{ github.sha }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"

          echo "Deploying image: ${IMAGE}"

          # Update the deployment image
          kubectl set image deployment/alphastack-api \
            alphastack-api="${IMAGE}" \
            --namespace=alphastack-staging

          kubectl set image deployment/alphastack-engine \
            alphastack-engine="${IMAGE}" \
            --namespace=alphastack-staging

          # Wait for rollout to complete (max 5 minutes)
          kubectl rollout status deployment/alphastack-api \
            --namespace=alphastack-staging --timeout=300s
          kubectl rollout status deployment/alphastack-engine \
            --namespace=alphastack-staging --timeout=300s

          echo "✅ Staging deployment complete"

      - name: Smoke test
        run: |
          set -euo pipefail
          STAGING_URL="https://staging.alphastack.dev"

          # Wait for the service to be reachable
          for i in $(seq 1 30); do
            if curl -sf "${STAGING_URL}/health" > /dev/null 2>&1; then
              echo "✅ Health check passed"
              break
            fi
            echo "Waiting for service... (attempt ${i}/30)"
            sleep 10
          done

          # Verify readiness endpoint
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}/health/ready")
          if [ "${HTTP_CODE}" = "200" ]; then
            echo "✅ Readiness check passed"
          else
            echo "⚠️  Readiness check returned ${HTTP_CODE} (non-critical for staging)"
          fi

          # Verify metrics endpoint
          if curl -sf "${STAGING_URL}/metrics" | grep -q "alphastack"; then
            echo "✅ Metrics endpoint is serving"
          else
            echo "⚠️  Metrics endpoint check failed"
          fi

  # ─── Deploy to Production ───────────────────────────────────────
  deploy-production:
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://alphastack.dev

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_PRODUCTION }}

      - name: Deploy to production (canary)
        run: |
          set -euo pipefail
          IMAGE_TAG="${{ github.sha }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"

          echo "Deploying canary: ${IMAGE}"

          # Canary: update only the API deployment first
          kubectl set image deployment/alphastack-api \
            alphastack-api="${IMAGE}" \
            --namespace=alphastack-production

          kubectl rollout status deployment/alphastack-api \
            --namespace=alphastack-production --timeout=300s

          echo "✅ API canary deployed"

      - name: Verify production health
        run: |
          set -euo pipefail
          PROD_URL="https://alphastack.dev"

          # Health check
          for i in $(seq 1 30); do
            if curl -sf "${PROD_URL}/health" > /dev/null 2>&1; then
              echo "✅ Production health check passed"
              break
            fi
            echo "Waiting for production service... (attempt ${i}/30)"
            sleep 10
          done

          # Readiness check
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${PROD_URL}/health/ready")
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "❌ Production readiness check failed (HTTP ${HTTP_CODE})"
            echo "Rolling back..."
            kubectl rollout undo deployment/alphastack-api --namespace=alphastack-production
            exit 1
          fi
          echo "✅ Production health verified"

      - name: Deploy engine to production
        run: |
          set -euo pipefail
          IMAGE_TAG="${{ github.sha }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"

          kubectl set image deployment/alphastack-engine \
            alphastack-engine="${IMAGE}" \
            --namespace=alphastack-production

          kubectl rollout status deployment/alphastack-engine \
            --namespace=alphastack-production --timeout=300s

          echo "✅ Production deployment complete (API + Engine)"
