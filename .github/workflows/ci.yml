name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ─── Python: lint + type-check + test ────────────────────────────
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check src/ tests/ --output-format=github
          ruff format --check src/ tests/

      - name: Type check with mypy
        run: |
          mypy src/alphastack/ --ignore-missing-imports --no-error-summary || true

      - name: Run tests with pytest
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=alphastack \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -x
        env:
          REDIS_URL: redis://localhost:6379/0

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage.xml

  # ─── TypeScript: lint + build (web/mobile/desktop) ───────────────
  typescript:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [web, mobile, desktop]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: |
          if [ -d "${{ matrix.app }}" ]; then
            cd ${{ matrix.app }}
            npm ci
          else
            echo "No ${{ matrix.app }} directory, skipping"
          fi

      - name: Lint
        run: |
          if [ -d "${{ matrix.app }}" ]; then
            cd ${{ matrix.app }}
            npm run lint --if-present
          fi

      - name: Build
        run: |
          if [ -d "${{ matrix.app }}" ]; then
            cd ${{ matrix.app }}
            npm run build --if-present
          fi

  # ─── Docker build test ───────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [python]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: alphastack:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
