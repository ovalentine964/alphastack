name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  RUST_TOOLCHAIN: stable

jobs:
  # ─── Python: lint + type-check + test ────────────────────────────
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check src/ tests/ --output-format=github
          ruff format --check src/ tests/

      - name: Type check with mypy
        run: |
          mypy src/alphastack/ --ignore-missing-imports

      - name: Run tests with pytest
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=alphastack \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -x
        env:
          REDIS_URL: redis://localhost:6379/0

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage.xml

  # ─── Rust core: build + test ─────────────────────────────────────
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            src/rust_core/target/
            ~/.cargo/registry/
            ~/.cargo/git/
          key: rust-${{ runner.os }}-${{ hashFiles('src/rust_core/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-

      - name: Install maturin
        run: pip install maturin>=1.4.0

      - name: Build Rust extension
        working-directory: src/rust_core
        run: maturin develop --release

      - name: Test Rust import
        run: |
          python -c "import alphastack_rust_core; print('✅ Rust core loaded:', dir(alphastack_rust_core))"

      - name: Run Rust tests
        working-directory: src/rust_core
        run: cargo test --release

  # ─── TypeScript: lint + build (web + desktop) ────────────────────
  typescript:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [web, desktop]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        working-directory: apps/${{ matrix.app }}
        run: npm ci

      - name: Lint
        working-directory: apps/${{ matrix.app }}
        run: npm run lint --if-present

      - name: Build
        working-directory: apps/${{ matrix.app }}
        run: npm run build

  # ─── Flutter (mobile): build ─────────────────────────────────────
  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.0

      - name: Install dependencies
        working-directory: apps/mobile
        run: flutter pub get

      - name: Analyze
        working-directory: apps/mobile
        run: flutter analyze --no-fatal-infos

      - name: Build APK
        working-directory: apps/mobile
        run: flutter build apk --debug

  # ─── Docker build test ───────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [python, rust]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile
          push: false
          tags: alphastack:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
