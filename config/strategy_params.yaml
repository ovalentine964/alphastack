# =============================================================================
# AlphaStack — Strategy Parameters (v1.1)
# =============================================================================
# All tunable strategy parameters.  Steps load from here via StrategyConfig.
# Parameters can be overridden per-regime (trending / ranging / risk_off).
# =============================================================================

# -----------------------------------------------------------------------------
# Step 01 — Fundamental Intelligence
# -----------------------------------------------------------------------------
fundamental:
  vix_risk_off: 25.0            # VIX above this → risk_off regime
  vix_mixed: 15.0               # VIX above this → mixed regime
  bias_threshold: 0.2           # |score| must exceed this for directional bias
  news_dampen_factor: 0.5       # Conviction multiplier near high-impact events
  macro_refresh_minutes: 60     # How often to refresh macro data
  economic_calendar_weight: 0.3 # Weight of economic calendar events

# -----------------------------------------------------------------------------
# Step 02 — Market Bias
# -----------------------------------------------------------------------------
bias:
  short_ma_period: 20           # Short-term MA period
  long_ma_period: 50            # Long-term MA period
  htf_short_ma_period: 20       # Higher-TF short MA
  htf_long_ma_period: 50        # Higher-TF long MA
  bias_threshold: 0.003         # |score| threshold for directional bias
  trend_strength_scale: 50.0    # Multiplier to normalize score to 0-1
  ema_periods: [9, 21, 50, 200] # EMA stack for trend confirmation
  adx_threshold: 25.0           # ADX above this = trending

# -----------------------------------------------------------------------------
# Step 03 — Session Analysis
# -----------------------------------------------------------------------------
session:
  london_start: 7
  london_end: 16
  ny_start: 12
  ny_end: 21
  asian_start: 0
  asian_end: 8
  volatility:
    london: 1.0
    new_york: 0.9
    london_ny_overlap: 1.2      # Highest vol period
    asian: 0.6
    off_hours: 0.3
  # Session-specific spread limits (pips)
  max_spread:
    london: 3.0
    new_york: 3.5
    london_ny_overlap: 2.5
    asian: 5.0
    off_hours: 8.0

# -----------------------------------------------------------------------------
# Step 04 — Market Structure
# -----------------------------------------------------------------------------
structure:
  swing_lookback: 5             # Bars to look back for swing detection
  min_swings_required: 2        # Minimum swing points to classify structure
  keep_last_n_swings: 5         # How many recent swings to retain
  break_of_structure_confirm: 2 # Bars to confirm BOS
  change_of_character_atr: 0.5  # ATR threshold for ChoCh detection

# -----------------------------------------------------------------------------
# Step 05 — Support / Resistance
# -----------------------------------------------------------------------------
sr:
  bucket_method: "atr_relative" # "fixed" or "atr_relative"
  fixed_bucket_pips: 50.0       # Used when method = "fixed"
  atr_bucket_multiplier: 0.5    # bucket = ATR × this
  min_touches: 2                # Minimum touches to qualify as a level
  recency_decay: 0.95           # Exponential decay per bar for touch weighting
  zone_tolerance_atr: 0.2      # Zone width = ATR × this
  max_levels: 10                # Max S/R levels to track per side

# -----------------------------------------------------------------------------
# Step 06 — Liquidity Detection
# -----------------------------------------------------------------------------
liquidity:
  tolerance_pips: 10.0          # Tolerance for equal highs/lows detection
  tolerance_method: "atr_relative"
  atr_tolerance_multiplier: 0.2 # tolerance = ATR × this
  min_equal_points: 3           # Min equal highs/lows for liquidity pool
  sweep_confirmation_bars: 2    # Bars to confirm liquidity sweep

# -----------------------------------------------------------------------------
# Step 07 — Smart Money Concepts
# -----------------------------------------------------------------------------
smc:
  max_order_blocks: 5           # Max unmitigated OBs to keep
  max_fvgs: 5                   # Max unfilled FVGs to keep
  ob_impulse_threshold: 1.0     # Close must exceed prev high/low by this × ATR
  fvg_min_size_atr: 0.3        # Min FVG size as multiple of ATR
  mitigation_type: "wick"       # "wick" or "close" — how OB is mitigated
  breaker_block_enabled: true   # Detect breaker blocks
  liquidity_grab_enabled: true  # Detect liquidity grabs

# -----------------------------------------------------------------------------
# Step 08 — RSI
# -----------------------------------------------------------------------------
rsi:
  period: 14
  overbought: 70
  oversold: 30
  divergence_lookback: 10       # Bars for divergence detection
  # Regime-adaptive RSI thresholds
  regimes:
    trending:
      overbought: 80
      oversold: 40
    ranging:
      overbought: 70
      oversold: 30
    risk_off:
      overbought: 65
      oversold: 25

# -----------------------------------------------------------------------------
# Step 09 — Candlestick Patterns
# -----------------------------------------------------------------------------
candlestick:
  lookback_bars: 5              # How many recent bars to scan
  doji_strength: 0.1            # Doji alone is weak
  volume_weight_enabled: false   # Enable volume weighting when available
  # Pattern weights (relative importance)
  patterns:
    engulfing: 0.8
    pin_bar: 0.7
    inside_bar: 0.5
    doji: 0.1
    morning_evening_star: 0.9
    three_soldiers_crows: 0.7

# -----------------------------------------------------------------------------
# Step 10 — Confluence Engine
# -----------------------------------------------------------------------------
confluence:
  threshold: 40                 # Minimum score to generate a signal
  min_agreeing_components: 3    # Minimum components that must agree
  weights:
    fundamental: 0.05
    market_bias: 0.15
    session: 0.05
    structure: 0.20
    sr_levels: 0.10
    liquidity: 0.10
    smc: 0.15
    rsi: 0.10
    candlestick: 0.10
  # Regime-adaptive weight overrides
  regimes:
    trending:
      structure: 0.25
      smc: 0.20
      sr_levels: 0.05
      rsi: 0.05
    ranging:
      structure: 0.10
      smc: 0.10
      sr_levels: 0.20
      rsi: 0.15
    risk_off:
      fundamental: 0.15
      market_bias: 0.10
      structure: 0.15
      sr_levels: 0.15
      rsi: 0.10

# -----------------------------------------------------------------------------
# Step 11 — Position Sizing
# -----------------------------------------------------------------------------
sizing:
  default_risk_pct: 1.0         # % of account to risk per trade
  max_risk_pct: 2.0             # Hard cap
  min_position_size: 0.01       # Micro-lot minimum
  # Kelly criterion (optional)
  kelly_enabled: false
  kelly_fraction: 0.25          # Quarter-Kelly for safety
  # Confluence-based scaling
  confluence_scaling:
    enabled: true
    min_score: 40               # Min confluence to trade
    max_score: 100              # Score for full position size
    scale_factor: 1.5           # Max multiplier at highest confluence

# -----------------------------------------------------------------------------
# Step 12 — Stop Loss
# -----------------------------------------------------------------------------
stop_loss:
  atr_multiplier: 1.5           # ATR-based stop distance
  buffer_pips: 5.0              # Buffer beyond swing point
  buffer_method: "atr_relative" # "fixed" or "atr_relative"
  atr_buffer_multiplier: 0.1    # buffer = ATR × this
  fallback_atr_multiplier: 1.5  # Fallback when no swing available
  # Regime-adaptive stops
  regimes:
    trending:
      atr_multiplier: 2.0       # Wider stops in trends
    ranging:
      atr_multiplier: 1.0       # Tighter stops in ranges
    risk_off:
      atr_multiplier: 1.5       # Standard stops in risk-off

# -----------------------------------------------------------------------------
# Step 13 — Take Profit
# -----------------------------------------------------------------------------
take_profit:
  rr_multipliers: [1.5, 2.5, 4.0]   # R:R targets for partial TPs
  sr_override_enabled: true          # Override TP1 with nearest S/R if closer
  # Regime-adaptive TP multipliers
  regimes:
    trending:
      rr_multipliers: [2.0, 3.5, 5.0]
    ranging:
      rr_multipliers: [1.0, 1.5, 2.0]
    risk_off:
      rr_multipliers: [1.0, 2.0, 3.0]

# -----------------------------------------------------------------------------
# Step 14 — Trade Management
# -----------------------------------------------------------------------------
management:
  breakeven_at_rr: 1.0          # Move SL to entry after this R:R
  trail_trigger_rr: 1.5         # Start trailing after this R:R
  trail_atr_multiplier: 1.0     # Trail distance = ATR × this
  partial_close_pct: 50         # Close this % at TP1
  # Regime-adaptive management
  regimes:
    trending:
      trail_atr_multiplier: 1.5
      breakeven_at_rr: 1.5
    ranging:
      trail_atr_multiplier: 0.75
      breakeven_at_rr: 0.75
    risk_off:
      trail_atr_multiplier: 0.5
      partial_close_pct: 75     # Take more off early in risk-off

# -----------------------------------------------------------------------------
# Step 15 — Exit Conditions
# -----------------------------------------------------------------------------
exit:
  max_hold_hours: 48            # Max time to hold a position
  confluence_exit_threshold: 25 # Exit if confluence drops below this
  rsi_exit_action: "warning"    # "warning" | "tighten_stop" | "exit"
  # Timeframe-adaptive hold time
  timeframe_hold_hours:
    "15M": 24
    "1H": 48
    "4H": 168     # 1 week
    "1D": 336     # 2 weeks
  # Trailing stop activation (points in profit)
  trailing:
    enabled: true
    start_points: 50
    step_points: 20
  breakeven:
    enabled: true
    start_points: 30
    offset_points: 5

# -----------------------------------------------------------------------------
# Walk-Forward Validation (backtesting)
# -----------------------------------------------------------------------------
walk_forward:
  train_bars: 5000
  test_bars: 1000
  step_bars: 500
  min_trades: 30                # Min trades per fold for statistical validity
  # Optimization target
  optimize_for: "sharpe"        # "sharpe" | "sortino" | "profit_factor" | "win_rate"
